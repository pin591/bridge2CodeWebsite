<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <title>Login</title>
</head>
<body>
    <div class="container">
        <header>
            <div class="d-flex align-items-center justify-content-between">
                
                <a href="index.html" class="d-flex align-items-center text-decoration-none">
                    <img src="/resources/coder.png" alt="Logo Code2Bridge" width="150" height="150" class="me-2">
                    <span class="logo-text">Code2Bridge</span>
                </a>

                <nav>
                    <ul class="nav align-items-center">
                        <li class="nav-item">
                            <a class="nav-button" href="../index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-button" href="/web/curso.html">Cursos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-button" href="#">Sobre Nosotros</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-button" href="/web/contacto.html">Contacto</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-button-active" href="/web/login.html">Registro</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-button" href="#">Recursos gratis</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-button" href="/web/equipo.html">Equipo</a>
                        </li>
                    </ul>
                </nav>
                <div class="social-icons">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-x-twitter"></i></a>
                    <a href="#"><i class="fab fa-linkedin"></i></a>
                </div>
            </div>
        </header>

        <div class="main-container">
            <div class="d-flex flex-column align-items-center w-100">
                <div class="nav-tabs-container">
                    <div class="nav-tabs-custom">
                        <a href="#" class="nav-tab-item active">
                            <i class="fas fa-lock"></i> Login
                        </a>
                        <a href="#" class="nav-tab-item">
                            <i class="fas fa-user-plus"></i> Registro
                        </a>
                        <a href="#" class="nav-tab-item">
                            <i class="fas fa-info-circle"></i> Curso
                        </a>
                    </div>
                </div>

            
            <div class="login-container">
                <div class="campus-brand">
                    <h2><i class="fas fa-shield-alt me-2"></i>Birdge2Campus</h2>
                    <p>Acceso seguro al aula virtual</p>
                </div>

                <form>
                    <div class="mb-4">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-2"></i>Correo electrónico
                        </label>
                        <input type="email" class="form-control" id="email" placeholder="ejemplo@ciberseguridad.com" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-key me-2"></i>Contraseña
                        </label>
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-login">
                        <i class="fas fa-sign-in-alt me-2"></i>Ingresar al campus
                    </button>

                    <div class="extra-links">
                        <a href="#"><i class="fas fa-question-circle me-1"></i>¿Olvidaste tu contraseña?</a>
                        <a href="#"><i class="fas fa-headset me-1"></i>Ayuda</a>
                    </div>

                    <div class="divider">
                        <span>o</span>
                    </div>

                    <div class="register-link">
                        <a href="#"><i class="fas fa-user-plus me-1"></i>Crear una cuenta de acceso</a>
                    </div>
                </form>

                <div class="security-badge">
                    <span><i class="fas fa-shield-alt"></i> Conexión cifrada</span>
                    <span><i class="fas fa-mobile-alt"></i> 2FA disponible</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
