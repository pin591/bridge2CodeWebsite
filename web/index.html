<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../styles/header.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <title>Inicio</title>
</head>
<body>
    <div class="container">
        <header>
            <div class="d-flex align-items-center justify-content-between">
                
                <a href="index.html" class="d-flex align-items-center text-decoration-none">
                    <img src="/resources/coder.png" alt="Logo Code2Bridge" width="80" height="80" class="me-2">
                    <span class="logo-text">Code2Bridge</span>
                </a>

                <nav>
                    <ul class="nav align-items-center">
                        <li class="nav-item">
                            <a class="nav-button-active" href="index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-button" href="course-details.html">Cursos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-button" href="#">Sobre Nosotros</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-info ms-3" href="#">Contacto</a>
                        </li>
                    </ul>
                </nav>

            </div>
        </header>

        <section class="my-5">
            <div class="d-flex align-items-center justify-content-evenly">      
                <div class="m-5">
                    <h2 class="text-white">Curso de ciberseguridad profesional</h2>
                    <p class="text-white">Aprende a proteger datos, sistemas y redes frente a amenazas reales.</p>
                </div>
                <img src="/resources/ciberseguridad.jpg" width="300" alt="Descripción">
                <div class="mx-5 px-5"></div>
            </div>
        </section>
        
        <section>
            <form class="row g-3 mt-3">

                <h2 class="text-white a">Deja aqui tu mensaje</h2>

                <div class="col-6 text-white">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombre" placeholder="Escribe tu nombre">
                </div>

                <div class="col-6 text-white">
                    <label for="inputEmail" class="form-label">Email</label>
                    <input type="text" class="form-control" id="inputEmail" placeholder="Escribe tu email">
                </div>

                <div class="col-6 text-white">
                    <label for="inputPhone" class="form-label">Teléfono</label>
                    <input type="number" class="form-control" id="inputPhone" placeholder="Escribe tu número de teléfono">
                </div>

                <div class="col-12 text-white">
                    <label for="inputMessage" class="form-label">Mensaje</label>
                    <input type="text" class="form-control" id="inputMessage" placeholder="Escribe un mensaje de texto">
                </div>

                <div class="col-12 text-center">
                    <button type="submit" class="btn btn-primary">
                        Enviar
                    </button>
                </div>
            </form>
        </section>

    </div>
</body>
</html>
