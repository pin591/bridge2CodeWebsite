<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Inicio de Sesión</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

  <main>
    <h1>Hola, un gusto conocerte! 👋</h1>
    <p id="instrucciones">Ingresa tu correo electrónico y contraseña para acceder!</p>

    <form id="loginForm" action="/login" method="POST">
        <div>
            <input type="email" placeholder="ejemplo@gmail.com" name="email" required>
        </div>
        <div class="password-wrapper">
             <input type="password" placeholder="Contraseña" name="password" required>
             <button type="button" class="toggle-password">🙈</button>
        </div>
        <div>
            <a href="/recuperar">¿Has olvidado tu contraseña?</a>
        </div>
           <button type="submit">Ingresar</button>
    </form>
    
</main>

    <script src="login.js"></script>
</body>
</html>
