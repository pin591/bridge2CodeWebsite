<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Code2Bridge</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
</head>
<body>

    <header>
        <div class="d-flex align-items-center justify-content-between">
            <a href="../index/index.html" class="d-flex align-items-center text-decoration-none">
                <i class="fas fa-shield-halved" style="font-size: 2.5rem; color: white; margin-right: 10px;"></i>
                <span class="logo-text">Code2Bridge</span>
            </a>

            <nav>
                <ul class="nav align-items-center">
                    <li class="nav-item"><a class="nav-button" href="../index/index.html">Inicio</a></li>
                    <li class="nav-item"><a class="nav-button" href="../curso/curso.html">Cursos</a></li>
                    <li class="nav-item"><a class="nav-button" href="../metodologia/metodologia.html">Metodologia</a></li>
                    <li class="nav-item"><a class="nav-button" href="../sobrenosotros/sobrenosotros.html">Sobre Nosotros</a></li>
                    <li class="nav-item"><a class="nav-button" href="../contacto/contacto.html">Contacto</a></li>
                    <li class="nav-item"><a class="nav-button" href="../calendari/calendari.html">Calendari</a></li>
                    <li class="nav-item"><a class="nav-button" href="#">Recursos gratis</a></li>
                    <li class="nav-item"><a class="nav-button-active" href="#">Login/Sign in</a></li>
                </ul>
            </nav>

            <div class="social-icons">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
    </header>

    <main>
        <div id="mensajeExito" class="hidden">✅ ¡Bienvenido!</div>
        <div id="mensajeError" class="hidden">❌ Correo o contraseña incorrectos</div>

        <h1>Hola, un gusto conocerte! 👋</h1>
        <p id="instrucciones">Ingresa tu correo electrónico y contraseña para acceder!</p>

        <form id="loginForm">
            <div>
                <input type="email" placeholder="ejemplo@gmail.com" name="email" required>
            </div>
            <div class="password-wrapper">
                <input type="password" placeholder="Contraseña" name="password" required>
                <button type="button" class="toggle-password">🙈</button>
            </div>
            <div>
                <a href="/recuperar">¿Has olvidado tu contraseña?</a>
            </div>
            <button type="submit">Ingresar</button>
        </form>
    </main>

    <script src="login.js"></script>
</body>
</html>
